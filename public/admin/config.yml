backend:
  name: github
  repo: kcplayandwork/penguin-mama-blog
  branch: main
  base_url: https://sveltia-cms-auth-seven.vercel.app

media_folder: public/images
public_folder: /images
locale: zh_Hant

collections:
  - name: blog
    label: 文章管理
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    extension: md
    fields:
      - {label: 標題, name: title, widget: string}
      - {label: 摘要, name: description, widget: text}
      - {label: 分類, name: category, widget: select, options: [{label: 親子生活, value: parenting},{label: 職場爸媽, value: working},{label: 旅遊手記, value: travel}]}
      - {label: 發布日期, name: pubDate, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false}
      - {label: 草稿, name: draft, widget: boolean, default: false, required: false}
      - {label: 文章內容, name: body, widget: markdown}
